<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>linux | @profile</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Video/Gif Arka Planı (Opsiyonel) veya Saf Yağmur */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .raindrop {
            position: absolute;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.4));
            width: 1px;
            animation: fall linear infinite;
        }

        /* Giriş Paneli */
        #entry-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #entry-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.2);
        }

        .click-to-enter {
            font-size: 12px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
            cursor: pointer;
        }

        /* Profil Kartı Gelişmiş */
        .main-wrapper {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease 0.5s;
        }

        .main-wrapper.show {
            opacity: 1;
            transform: translateY(0);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 50px 40px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.5);
        }

        .avatar-box {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
            transition: 0.5s;
        }

        .avatar-box:hover img {
            transform: scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }

        .username {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff 30%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        /* Orijinal Badge Sistemi */
        .badge-list {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .badge-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            position: relative;
        }

        .badge-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .badge-item img {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        /* Müzik Çalar Widget */
        .music-widget {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .disc-anim {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: conic-gradient(#333, #fff, #333);
            animation: spin 3s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .view-counter {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .social-btn {
            font-size: 20px;
            color: rgba(255,255,255,0.4);
            transition: 0.3s;
        }

        .social-btn:hover {
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }

    </style>
</head>
<body>

    <div id="entry-overlay" onclick="unlock()">
        <div class="click-to-enter text-center">
            <i class="fa-solid fa-shield-halved mb-4 block text-3xl"></i>
            [ click to access ]
        </div>
    </div>

    <div id="canvas-container"></div>

    <div class="main-wrapper" id="content">
        <div class="glass-card">
            <div class="view-counter">
                Views: <span id="count-num">0</span>
            </div>

            <div class="music-widget">
                <div class="disc-anim"></div>
                <div class="text-left">
                    <p class="text-[9px] text-blue-400 font-bold uppercase tracking-[2px]">Currently Playing</p>
                    <p class="text-sm font-medium">Inna - Amazing</p>
                </div>
            </div>

            <div class="avatar-box">
                <img src="https://cdn.discordapp.com/avatars/1305977261454917703/5d680e3ff33e58ef19d6dfd1041119c8.webp?size=1024" alt="linux">
            </div>

            <h1 class="username">linux</h1>
            <p class="text-[11px] text-gray-500 uppercase tracking-[4px] mb-4 underline decoration-blue-500/50">Developer</p>

            <div class="badge-list">
                <div class="badge-item"><img src="https://client-gold-nu-77.vercel.app/owner.svg" title="Owner"></div>
                <div class="badge-item"><img src="https://client-gold-nu-77.vercel.app/staff.svg" title="Staff"></div>
                <div class="badge-item"><img src="https://client-gold-nu-77.vercel.app/verified.svg" title="Verified"></div>
                <div class="badge-item"><img src="https://client-gold-nu-77.vercel.app/premium.svg" title="Premium"></div>
                <div class="badge-item"><img src="https://client-gold-nu-77.vercel.app/booster.svg" title="Booster"></div>
            </div>

            <div class="mt-8 flex justify-center gap-8">
                <a href="#" class="social-btn"><i class="fa-brands fa-discord"></i></a>
                <a href="#" class="social-btn"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="social-btn"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <audio id="bg-audio" src="https://client-gold-nu-77.vercel.app/inna-amazing.mp3" loop></audio>

    <script>
        // Detaylı Yağmur Efekti
        const container = document.getElementById('canvas-container');
        function createRain() {
            for(let i=0; i<80; i++) {
                const drop = document.createElement('div');
                drop.className = 'raindrop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.height = Math.random() * 100 + 50 + 'px';
                drop.style.top = -Math.random() * 200 + 'px';
                drop.style.animationDuration = Math.random() * 0.5 + 0.5 + 's';
                drop.style.opacity = Math.random() * 0.3;
                container.appendChild(drop);
            }
        }
        createRain();

        // Sayfa Açılış Fonksiyonu
        function unlock() {
            const audio = document.getElementById('bg-audio');
            audio.volume = 0.4;
            audio.play();

            document.getElementById('entry-overlay').classList.add('fade-out');
            document.getElementById('content').classList.add('show');

            // Sayaç Başlat (0'dan hızlıca hedef sayıya çıksın veya 0'da kalsın)
            startCounter();
        }

        function startCounter() {
            let target = Math.floor(Math.random() * 1000) + 500;
            let current = 0;
            const el = document.getElementById('count-num');
            
            const timer = setInterval(() => {
                if(current >= target) clearInterval(timer);
                current += Math.ceil((target - current) / 10);
                el.innerText = current;
            }, 50);
        }

        // Sağ Tık Engelleme (rip.tf stili)
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
