<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | @kullaniciadi</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
            background: #050505;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Yağmur Efekti */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.1));
            width: 1px;
            height: 60px;
            top: -100px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        /* Glassmorphism Kart */
        .bio-card {
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            position: relative;
        }

        /* Profil Fotoğrafı (PP) */
        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }

        /* Online Noktası */
        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 14px;
            height: 14px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid #0a0a0a;
            box-shadow: 0 0 10px #22c55e;
        }

        /* Badges */
        .badges {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge i {
            font-size: 12px;
            color: #fff;
        }

        /* Sayaç */
        .view-count {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .link-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s ease;
            color: #ccc;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            transform: scale(1.02);
        }

        .username-text {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="rain" id="rainLayer"></div>

    <div class="bio-card">
        <div class="view-count">
            <i class="fa-regular fa-eye"></i>
            <span id="counter">0</span>
        </div>

        <div class="avatar-container">
            <img src="https://via.placeholder.com/150" alt="PP" class="avatar">
            <div class="status-dot"></div>
        </div>
        
        <div class="mb-6">
            <h1 class="username-text">@kullaniciadi</h1>
            <div class="badges">
                <div class="badge" title="Developer"><i class="fa-solid fa-code"></i></div>
                <div class="badge" title="Verified"><i class="fa-solid fa-check-double text-blue-400"></i></div>
                <div class="badge" title="Early Supporter"><i class="fa-solid fa-star text-yellow-400"></i></div>
            </div>
        </div>

        <div class="flex flex-col mt-4">
            <a href="#" class="link-btn"><i class="fa-brands fa-discord"></i> Discord</a>
            <a href="#" class="link-btn"><i class="fa-brands fa-github"></i> GitHub Repo</a>
            <a href="#" class="link-btn"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Files</a>
        </div>

        <div class="mt-10 text-[9px] text-gray-700 tracking-[4px] uppercase">
            protected by secure-cloud
        </div>
    </div>

    <script>
        // Yağmur Efekti
        const layer = document.getElementById('rainLayer');
        for (let i = 0; i < 60; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.6 + 0.4) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            layer.appendChild(drop);
        }

        // Basit Ziyaretçi Sayacı (Local Storage)
        let count = localStorage.getItem('visit_count') || 0;
        count++;
        localStorage.setItem('visit_count', count);
        document.getElementById('counter').innerText = count;
    </script>
</body>
</html>
