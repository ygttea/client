<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Storage | Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
            background: #050505;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Yağmur Efekti */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.2));
            width: 1px;
            height: 60px;
            top: -100px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        /* Glassmorphism Kart */
        .main-card {
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 50px;
            width: 95%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        /* Upload Alanı */
        .upload-box {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 40px 20px;
            margin: 25px 0;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .upload-box:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-action {
            background: #fff;
            color: #000;
            font-size: 13px;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .btn-action:hover {
            opacity: 0.8;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #fff;
        }

        .glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="rain" id="rainLayer"></div>

    <div class="main-card">
        <h1 class="text-2xl font-bold glow">FILE HOSTING</h1>
        <p class="text-xs text-gray-500 mt-2 uppercase tracking-widest">Secure Cloud Service</p>

        <div class="upload-box" id="dropArea">
            <i class="fa-solid fa-arrow-up-from-bracket text-3xl mb-4 opacity-50"></i>
            <p class="text-sm text-gray-400">Dosyaları buraya bırakın</p>
            <input type="file" id="hiddenInput" class="hidden">
            <div class="mt-6">
                <button onclick="document.getElementById('hiddenInput').click()" class="btn-action">
                    Dosya Seç
                </button>
            </div>
        </div>

        <div id="status" class="text-[10px] text-gray-500 uppercase tracking-tighter hidden"></div>

        <div class="footer-links flex justify-center gap-5 mt-10">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-solid fa-code"></i></a>
            <a href="#"><i class="fa-solid fa-shield-halved"></i></a>
        </div>
    </div>

    <script>
        // Yağmur Animasyonu
        const layer = document.getElementById('rainLayer');
        for (let i = 0; i < 80; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.4 + 0.4) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            layer.appendChild(drop);
        }

        // Input İşlemleri
        const input = document.getElementById('hiddenInput');
        const status = document.getElementById('status');

        input.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                status.innerHTML = `Hazır: <span class="text-white">${e.target.files[0].name}</span>`;
                status.classList.remove('hidden');
            }
        });

        // Sürükle Bırak
        const dropArea = document.getElementById('dropArea');
        ['dragover', 'drop'].forEach(ev => {
            dropArea.addEventListener(ev, e => e.preventDefault());
        });

        dropArea.addEventListener('drop', (e) => {
            const file = e.dataTransfer.files[0];
            if(file) {
                status.innerHTML = `Hazır: <span class="text-white">${file.name}</span>`;
                status.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
