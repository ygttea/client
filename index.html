<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>linux | @profile</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.015);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
        }

        /* Arka Plan Yağmur & Blur Efekti */
        #bg-canvas {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #0f0f0f 0%, #050505 100%);
        }

        .raindrop {
            position: absolute;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.3));
            width: 1px;
            animation: fall linear infinite;
        }

        @keyframes fall { to { transform: translateY(110vh); } }

        /* Giriş Paneli - Müzik İçin Şart */
        #entry-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #entry-overlay.fade-out {
            opacity: 0; pointer-events: none; transform: scale(1.5);
        }

        .entry-text {
            font-size: 13px; letter-spacing: 10px; color: #555;
            text-transform: uppercase; animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Ana Profil Kartı */
        .main-container {
            opacity: 0; transform: scale(0.9);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .main-container.show { opacity: 1; transform: scale(1); }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 60px 45px;
            width: 480px;
            text-align: center;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        /* Profil Fotoğrafı (Glitch Efektli) */
        .avatar-wrapper {
            position: relative; width: 150px; height: 150px; margin: 0 auto 30px;
        }

        .avatar-wrapper img {
            width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            object-fit: cover; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar-wrapper:hover img {
            transform: scale(1.08) rotate(3deg);
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
        }

        /* Kullanıcı Adı (Glow Efekti) */
        .username-glitch {
            font-size: 42px; font-weight: 800; letter-spacing: -2px;
            background: linear-gradient(180deg, #fff 0%, #666 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        /* Badge Sistemi - Birebir rip.tf */
        .badge-container {
            display: flex; justify-content: center; gap: 14px; margin: 25px 0;
        }

        .badge {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }

        .badge:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
        }

        .badge img { width: 26px; height: 26px; }

        /* Müzik Widget (Modern) */
        .music-player {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 15px 30px;
            margin-bottom: 35px;
            display: flex; align-items: center; gap: 20px;
        }

        .music-icon {
            font-size: 24px; color: var(--accent);
            animation: spin 5s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Sayaç */
        .stats {
            position: absolute; top: 30px; right: 40px;
            font-size: 10px; color: rgba(255,255,255,0.2);
            letter-spacing: 3px; font-weight: bold;
        }

        .socials {
            display: flex; justify-content: center; gap: 30px; margin-top: 40px;
        }

        .social-link {
            font-size: 22px; color: rgba(255,255,255,0.3);
            transition: 0.4s;
        }

        .social-link:hover {
            color: #fff; transform: scale(1.3);
            filter: drop-shadow(0 0 10px #fff);
        }

    </style>
</head>
<body>

    <div id="entry-overlay" onclick="launch()">
        <div class="entry-text">[ click to bypass ]</div>
    </div>

    <div id="bg-canvas"></div>

    <div class="main-container" id="mainCard">
        <div class="glass-card">
            <div class="stats">VIEWS: <span id="viewCount">0</span></div>

            <div class="music-player">
                <i class="fa-solid fa-compact-disc music-icon"></i>
                <div class="text-left">
                    <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Now playing</p>
                    <p class="text-sm font-bold tracking-tight">Inna - Amazing</p>
                </div>
            </div>

            <div class="avatar-wrapper">
                <img src="https://client-gold-nu-77.vercel.app/5d680e3ff33e58ef19d6dfd1041119c8.png" alt="linux">
            </div>

            <h1 class="username-glitch">linux</h1>
            <p class="text-[12px] text-blue-400 font-bold uppercase tracking-[5px] mt-2 opacity-60">Fullstack</p>

            <div class="badge-container">
                <div class="badge"><img src="owner.svg" title="Owner"></div>
                <div class="badge"><img src="staff.svg" title="Staff"></div>
                <div class="badge"><img src="verified.svg" title="Verified"></div>
                <div class="badge"><img src="premium.svg" title="Premium"></div>
                <div class="badge"><img src="early.svg" title="Early Supporter"></div>
            </div>

            <div class="socials">
                <a href="#" class="social-link"><i class="fa-brands fa-discord"></i></a>
                <a href="#" class="social-link"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <audio id="audioTrack" src="inna-amazing.mp3" loop></audio>

    <script>
        // Detaylı Yağmur Scripti
        function createRain() {
            const canvas = document.getElementById('bg-canvas');
            for(let i=0; i<100; i++) {
                const drop = document.createElement('div');
                drop.className = 'raindrop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.height = Math.random() * 80 + 40 + 'px';
                drop.style.top = -Math.random() * 200 + 'px';
                drop.style.animationDuration = Math.random() * 0.4 + 0.3 + 's';
                drop.style.opacity = Math.random() * 0.2;
                canvas.appendChild(drop);
            }
        }
        createRain();

        // Siteyi Başlatma Fonksiyonu
        function launch() {
            const audio = document.getElementById('audioTrack');
            audio.volume = 0.5;
            audio.play().catch(e => console.log("Müzik hatası:", e));

            document.getElementById('entry-overlay').classList.add('fade-out');
            document.getElementById('mainCard').classList.add('show');
            
            animateCounter();
        }

        // Sahte Görüntülenme Sayacı
        function animateCounter() {
            let target = 732; 
            let current = 0;
            const el = document.getElementById('viewCount');
            const step = () => {
                if(current < target) {
                    current += Math.ceil((target - current) / 15 + 1);
                    el.innerText = current;
                    setTimeout(step, 40);
                }
            };
            step();
        }

        // Sağ tık ve bazı kısayolları engelle
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
        };
    </script>
</body>
</html>
