<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | @linux</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace !important;
            background: #050505;
            color: #fbf9f9;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
        }

        /* Yağmur Efekti */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .raindrop {
            position: absolute;
            background: linear-gradient(transparent, rgba(255, 251, 251, 0.2));
            width: 1px;
            height: 80px;
            top: -100px;
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* Profil Kartı */
        .profile-card {
            background: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            border: 1px solid rgba(255, 251, 251, 0.1);
            border-radius: 23px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Badge Tasarımı (Vercel Linklerinle) */
        .profile-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }
        .profile-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .profile-badge:hover { 
            transform: scale(1.15) translateY(-2px);
            background: rgba(255, 255, 255, 0.07);
        }
        .profile-badge img { width: 22px; height: 22px; }

        /* Müzik Çalar (En Üst) */
        .music-player {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 12px 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar-circle {
            width: 125px;
            height: 125px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.05);
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .username {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .view-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #playBtn {
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        #playBtn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="rain" id="rainContainer"></div>

    <div class="profile-card">
        <div class="view-badge">
            <i class="fa-regular fa-eye"></i> <span id="count">0</span>
        </div>

        <div class="music-player">
            <i class="fa-solid fa-compact-disc text-white animate-spin-slow"></i>
            <div class="text-left flex-1">
                <div class="text-[9px] text-gray-500 uppercase tracking-widest">Now Playing</div>
                <div class="text-[12px] font-bold">Inna - Amazing</div>
            </div>
            <button onclick="toggleAudio()" id="playBtn">
                <i class="fa-solid fa-pause" id="playIcon"></i>
            </button>
        </div>

        <div class="avatar-circle">
            <img src="https://cdn.discordapp.com/avatars/1305977261454917703/5d680e3ff33e58ef19d6dfd1041119c8.webp?size=1024" alt="linux">
        </div>

        <h1 class="username">linux</h1>
        
        <div class="profile-badges">
            <div class="profile-badge"><img src="https://client-gold-nu-77.vercel.app/owner.svg" title="Owner"></div>
            <div class="profile-badge"><img src="https://client-gold-nu-77.vercel.app/staff.svg" title="Staff"></div>
            <div class="profile-badge"><img src="https://client-gold-nu-77.vercel.app/verified.svg" title="Verified"></div>
            <div class="profile-badge"><img src="https://client-gold-nu-77.vercel.app/premium.svg" title="Premium"></div>
            <div class="profile-badge"><img src="https://client-gold-nu-77.vercel.app/booster.svg" title="Booster"></div>
        </div>

        <p class="text-[13px] text-gray-400 mt-6 italic opacity-80">"code is my religion."</p>

        <div class="flex justify-center gap-6 mt-8">
            <a href="#" class="text-gray-500 hover:text-white transition text-2xl"><i class="fab fa-discord"></i></a>
            <a href="#" class="text-gray-500 hover:text-white transition text-2xl"><i class="fab fa-github"></i></a>
            <a href="#" class="text-gray-500 hover:text-white transition text-2xl"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <audio id="myAudio" src="https://client-gold-nu-77.vercel.app/inna-amazing.mp3" loop autoplay></audio>

    <script>
        // Yağmur
        const rain = document.getElementById('rainContainer');
        for (let i = 0; i < 60; i++) {
            const drop = document.createElement('div');
            drop.className = 'raindrop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.4 + 0.4) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            rain.appendChild(drop);
        }

        // Müzik Kontrol
        const audio = document.getElementById('myAudio');
        const playIcon = document.getElementById('playIcon');
        
        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                playIcon.className = 'fa-solid fa-pause';
            } else {
                audio.pause();
                playIcon.className = 'fa-solid fa-play';
            }
        }

        // Ziyaretçi Sayacı
        let count = localStorage.getItem('v_count') || Math.floor(Math.random() * 500) + 100;
        count++;
        localStorage.setItem('v_count', count);
        document.getElementById('count').innerText = count;

        // Sayfa tıklandığında müziği başlat (Tarayıcı engeli için)
        document.body.addEventListener('click', () => {
            if (audio.paused) audio.play();
        }, { once: true });
    </script>

    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 4s linear infinite; }
    </style>
</body>
</html>
