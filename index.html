<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio | @linux</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace !important;
            background: #050505;
            color: #fbf9f9;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
        }

        /* Yağmur Efekti (ersy.html stili) */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .raindrop {
            position: absolute;
            background: linear-gradient(transparent, rgba(255, 251, 251, 0.3));
            width: 1px;
            height: 80px;
            top: -100px;
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* Profil Kartı (Orijinal Blur ve Şeffaflık) */
        .profile-card {
            background: rgba(0, 0, 0, 0.12) !important;
            backdrop-filter: blur(11px) !important;
            -webkit-backdrop-filter: blur(11px) !important;
            border: 1px solid rgba(255, 251, 251, 0.1);
            border-radius: 23px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Orijinal Badge Tasarımı */
        .profile-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .profile-badge {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 5px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .profile-badge:hover { transform: scale(1.1); }
        .profile-badge img { width: 20px; height: 20px; }

        /* Müzik Çalar Alanı (En Üst) */
        .music-player {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 10px 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .username {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(251, 249, 249, 0.6);
            margin-bottom: 5px;
        }

        .bio-text {
            color: #fbf9f9;
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .social-link {
            font-size: 24px;
            color: #fff;
            margin: 0 10px;
            filter: drop-shadow(0 0 5px #fff);
            transition: 0.3s;
        }
        .social-link:hover { transform: scale(1.2); opacity: 0.8; }

        /* View Count Badge */
        .view-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="rain" id="rainContainer"></div>

    <div class="profile-card">
        <div class="view-badge">
            <i class="fa-regular fa-eye"></i> <span id="count">493</span>
        </div>

        <div class="music-player">
            <i class="fa-solid fa-music text-white animate-pulse"></i>
            <div class="text-left flex-1">
                <div class="text-[10px] text-gray-400 uppercase tracking-tighter">Şu an çalıyor</div>
                <div class="text-[12px] font-bold">Sevdiğin Parça Adı</div>
            </div>
            <button onclick="toggleAudio()" id="playBtn">
                <i class="fa-solid fa-pause"></i>
            </button>
        </div>

        <div class="avatar-circle">
            <img src="pp.jpg" alt="Avatar"> </div>

        <h1 class="username">linux</h1>
        
        <div class="profile-badges">
            <div class="profile-badge"><img src="https://rip.tf/assets/img/badges/owner.svg" title="Owner"></div>
            <div class="profile-badge"><img src="https://rip.tf/assets/img/badges/staff.svg" title="Staff"></div>
            <div class="profile-badge"><img src="https://rip.tf/assets/img/badges/verified.svg" title="Verified"></div>
            <div class="profile-badge"><img src="https://rip.tf/assets/img/badges/premium.svg" title="Premium"></div>
        </div>

        <p class="bio-text mt-4">live alone, die alone.</p>

        <div class="mt-6">
            <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-link"><i class="fab fa-youtube"></i></a>
            <a href="#" class="social-link"><i class="fab fa-spotify"></i></a>
            <a href="#" class="social-link"><i class="fab fa-steam"></i></a>
        </div>
    </div>

    <audio id="myAudio" src="https://client-gold-nu-77.vercel.app/inna-amazing.mp3" loop autoplay></audio>

    <script>
        // Yağmur Döngüsü
        const rain = document.getElementById('rainContainer');
        for (let i = 0; i < 50; i++) {
            const drop = document.createElement('div');
            drop.className = 'raindrop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            rain.appendChild(drop);
        }

        // Müzik Kontrolü
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        }

        // Sayaç
        let count = localStorage.getItem('v_count') || 493;
        count++;
        localStorage.setItem('v_count', count);
        document.getElementById('count').innerText = count;
    </script>
</body>
</html>
