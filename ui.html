<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition ClickGUI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tahoma:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --border-color: #1a1a1a;
            --accent-color: #00bcd4; /* Exhibition Turkuazı */
            --text-color: #ffffff;
            --panel-bg: #151515;
            --header-bg: #181818;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Tahoma', sans-serif;
            user-select: none;
        }

        body {
            background-color: rgba(0, 0, 0, 0.4); /* Oyun içi arkası hafif karanlık */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Window */
        .exhibition-frame {
            width: 650px;
            height: 450px;
            background: var(--bg-color);
            border: 1px solid #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), inset 0 0 2px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header */
        .header {
            height: 35px;
            background: var(--header-bg);
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
        }

        .header-title {
            color: var(--accent-color);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 188, 212, 0.5);
        }

        .header-ver {
            color: #555;
            font-size: 11px;
        }

        /* Main Content Body */
        .content-area {
            display: flex;
            flex: 1;
        }

        /* Category Sidebar */
        .sidebar {
            width: 130px;
            background: #0f0f0f;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .category-item {
            padding: 18px 15px;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .category-item:hover {
            background: rgba(0, 188, 212, 0.05);
            color: #ccc;
        }

        .category-item.active {
            color: var(--accent-color);
            background: rgba(0, 188, 212, 0.1);
            border-right: 3px solid var(--accent-color);
        }

        /* Modules Section */
        .module-container {
            flex: 1;
            padding: 20px;
            background: linear-gradient(135deg, #111 0%, #0a0a0a 100%);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            overflow-y: auto;
        }

        /* Module Card */
        .module-card {
            background: #151515;
            border: 1px solid #222;
            padding: 12px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .module-card:hover {
            border-color: #333;
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .module-name {
            font-size: 13px;
            font-weight: bold;
            color: #eee;
        }

        /* Exhibition Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px; width: 12px;
            left: 3px; bottom: 3px;
            background-color: #555;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(16px); background-color: #fff; }

        /* Settings CSS */
        .settings-list {
            border-top: 1px solid #222;
            padding-top: 8px;
            margin-top: 5px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
        }

        .setting-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }

        /* Exhibition Style Slider (Range) */
        .ex-range {
            -webkit-appearance: none;
            width: 100%;
            height: 3px;
            background: #222;
            outline: none;
            border-radius: 2px;
        }

        .ex-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            cursor: pointer;
            border-radius: 50%;
        }

        /* Scrollbar (Zorunlu amk) */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

    </style>
</head>
<body>

<div class="exhibition-frame">
    <div class="header">
        <span class="header-title"><i class="fa-solid fa-ghost"></i> EXHIBITION</span>
        <span class="header-ver">v3.0 - Private Edition</span>
    </div>

    <div class="content-area">
        <div class="sidebar">
            <div class="category-item active" onclick="changeTab(this, 'combat')">
                <i class="fa-solid fa-crosshairs"></i> Combat
            </div>
            <div class="category-item" onclick="changeTab(this, 'movement')">
                <i class="fa-solid fa- person-running"></i> Movement
            </div>
            <div class="category-item" onclick="changeTab(this, 'player')">
                <i class="fa-solid fa-user"></i> Player
            </div>
            <div class="category-item" onclick="changeTab(this, 'visuals')">
                <i class="fa-solid fa-eye"></i> Visuals
            </div>
            <div class="category-item" onclick="changeTab(this, 'misc')">
                <i class="fa-solid fa-cube"></i> Misc
            </div>
        </div>

        <div class="module-container" id="module-box">
            <div class="module-card">
                <div class="module-header">
                    <span class="module-name">Killaura</span>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-list">
                    <div class="setting-item">
                        <span class="setting-label">Range: <span id="val1">4.2</span></span>
                        <input type="range" class="ex-range" min="3" max="6" step="0.1" value="4.2" oninput="document.getElementById('val1').innerText = this.value">
                    </div>
                    <div class="setting-item">
                        <span class="setting-label">APS: <span id="val2">12</span></span>
                        <input type="range" class="ex-range" min="1" max="20" value="12" oninput="document.getElementById('val2').innerText = this.value">
                    </div>
                </div>
            </div>

            <div class="module-card">
                <div class="module-header">
                    <span class="module-name">TargetStrafe</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-list">
                    <div class="setting-item">
                        <span class="setting-label">Radius: <span id="val3">2.0</span></span>
                        <input type="range" class="ex-range" min="0" max="5" step="0.1" value="2.0" oninput="document.getElementById('val3').innerText = this.value">
                    </div>
                </div>
            </div>
            
            <div class="module-card">
                <div class="module-header">
                    <span class="module-name">Velocity</span>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-list">
                    <div class="setting-item">
                        <span class="setting-label">Horizontal: 0%</span>
                        <input type="range" class="ex-range" value="0">
                    </div>
                </div>
            </div>

            <div class="module-card">
                <div class="module-header">
                    <span class="module-name">AutoBlock</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Sekme Değiştirme Amcık Sistemi
    function changeTab(element, category) {
        // Aktif sınıfını temizle
        document.querySelectorAll('.category-item').forEach(item => {
            item.classList.remove('active');
        });
        element.classList.add('active');

        // Burada normalde Java tarafına hangi kategorinin açıldığını gönderirsin
        console.log("Kategori değişti: " + category);
        
        // Örnek bir feedback efekti
        const box = document.getElementById('module-box');
        box.style.opacity = "0";
        setTimeout(() => {
            box.style.opacity = "1";
        }, 100);
    }

    // Sağ Tık Engelleme (Hile menüsü sonuçta amk)
    document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
