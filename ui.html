<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Exhibition ClickGUI</title>
    <style>
        /* O attığın ekran görüntüsündeki o soğuk, hileci havası */
        @font-face {
            font-family: 'ExFont';
            src: url('font.ttf'); /* Senin klasöründeki fontu kullanıyoruz amcık */
        }

        body {
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-family: 'ExFont', Tahoma, sans-serif;
            font-size: 11px;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* Ana Pencere */
        .window {
            width: 780px;
            height: 520px;
            background: #101010;
            border: 1px solid #000;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            box-shadow: 0 0 15px rgba(0,0,0,0.9);
        }

        /* Sol Sidebar (İkonlu yer) */
        .sidebar {
            width: 45px;
            background: #0d0d0d;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
        }

        .category-icon {
            width: 30px;
            height: 30px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            cursor: pointer;
            font-size: 18px;
        }

        .category-icon.active { color: #fff; border-left: 2px solid #fff; }

        /* Modül Alanı */
        .main-content {
            flex: 1;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 8px;
            background: #121212;
            overflow-y: auto;
        }

        /* Modül Kutuları (Ekran görüntüsündeki o kutu yapısı) */
        .module-group {
            border: 1px solid #252525;
            padding: 8px;
            background: #141414;
            display: flex;
            flex-direction: column;
        }

        .group-title {
            color: #ccc;
            font-weight: bold;
            font-size: 10px;
            margin-bottom: 8px;
            text-transform: capitalize;
            border-bottom: 1px solid #222;
            padding-bottom: 3px;
        }

        /* Checkbox ve Ayar Elemanları */
        .setting {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            color: #aaa;
        }

        .checkbox {
            width: 8px;
            height: 8px;
            border: 1px solid #333;
            margin-right: 6px;
            cursor: pointer;
            background: #1a1a1a;
        }

        .checkbox.enabled {
            background: #3399ff; /* Orijinal Exhibition mavisi/turkuazı */
            border-color: #4db8ff;
        }

        .label { cursor: pointer; font-size: 10px; }

        /* Slider (Range) */
        .slider-container { margin-top: 4px; margin-bottom: 8px; }
        .slider-info { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 2px; color: #777; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: #252525;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 8px;
            height: 8px;
            background: #3399ff;
            cursor: pointer;
            border-radius: 0;
        }

        /* Alt Bilgi */
        .footer {
            position: absolute;
            bottom: 5px;
            left: 55px;
            font-size: 9px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="sidebar">
            <div class="category-icon active">⚔️</div>
            <div class="category-icon">🏃</div>
            <div class="category-icon">👤</div>
            <div class="category-icon">👁️</div>
            <div class="category-icon">⚙️</div>
        </div>

        <div class="main-content">
            <div class="module-group">
                <div class="group-title">TargetStrafe</div>
                <div class="setting">
                    <div class="checkbox enabled"></div>
                    <span class="label">Enable</span>
                </div>
                <div class="setting">
                    <div class="checkbox"></div>
                    <span class="label">Behind</span>
                </div>
                <div class="slider-container">
                    <div class="slider-info"><span>Radius</span><span>2.0</span></div>
                    <input type="range" min="0" max="5" step="0.1" value="2.0">
                </div>
            </div>

            <div class="module-group">
                <div class="group-title">Speed</div>
                <div class="setting">
                    <div class="checkbox enabled"></div>
                    <span class="label">Enable</span>
                </div>
                <div class="setting">
                    <div class="checkbox enabled"></div>
                    <span class="label">Bob</span>
                </div>
                <div class="slider-container">
                    <div class="slider-info"><span>Steps</span><span>180</span></div>
                    <input type="range" min="0" max="180" value="180">
                </div>
            </div>

            <div class="module-group">
                <div class="group-title">Scaffold</div>
                <div class="setting">
                    <div class="checkbox"></div>
                    <span class="label">Enable</span>
                </div>
                <div class="setting">
                    <div class="checkbox enabled"></div>
                    <span class="label">Swing</span>
                </div>
            </div>

            <div class="module-group">
                <div class="group-title">LongJump</div>
                <div class="setting">
                    <div class="checkbox"></div>
                    <span class="label">Enable</span>
                </div>
            </div>
        </div>
        
        <div class="footer">PROTECTED BY SECURE-CLOUD | Beta Build - 022021</div>
    </div>

    <script>
        // Checkbox tıklama simülasyonu
        document.querySelectorAll('.checkbox').forEach(cb => {
            cb.addEventListener('click', function() {
                this.classList.toggle('enabled');
            });
        });

        // Sağ tık kapat (Hile menüsü sonuçta amk)
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
