<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Cloud Storage</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0a0a0a;
            --border: #1a1a1a;
            --accent: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Arka plandaki o çizgili hava */
        .bg-lines {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .upload-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .btn {
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: #ccc;
            text-decoration: none;
        }

        .btn:hover {
            background: #151515;
            border-color: #333;
            color: #fff;
            transform: translateY(-2px);
        }

        .btn i { font-size: 20px; }

        .footer-text {
            margin-top: 30px;
            font-size: 10px;
            color: #333;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #file-input { display: none; }

        /* Yükleme Durumu */
        #status {
            margin-top: 15px;
            font-size: 12px;
            color: #555;
            min-height: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 2px;
            background: #111;
            margin-top: 10px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="bg-lines"></div>

    <div class="upload-card">
        <a href="https://discord.gg/senin-linkin" class="btn">
            <i class="fa-brands fa-discord"></i>
            <span>Discord</span>
        </a>

        <a href="https://github.com/senin-repo" class="btn">
            <i class="fa-brands fa-github"></i>
            <span>GitHub Repo</span>
        </a>

        <label for="file-input" class="btn" style="border-color: #444; color: #fff;">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span>Upload Files</span>
        </label>
        <input type="file" id="file-input">

        <div id="status">Ready to upload...</div>
        <div class="progress-bar" id="p-bar">
            <div class="progress-fill" id="p-fill"></div>
        </div>

        <div class="footer-text">PROTECTED BY SECURE-CLOUD</div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status');
        const pBar = document.getElementById('p-bar');
        const pFill = document.getElementById('p-fill');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const fileName = this.files[0].name;
                status.innerText = "Uploading: " + fileName;
                pBar.style.display = 'block';

                // Yükleme Simülasyonu (Buraya backend bağlarsın amcık)
                let percent = 0;
                const interval = setInterval(() => {
                    percent += Math.random() * 15;
                    if (percent >= 100) {
                        percent = 100;
                        clearInterval(interval);
                        status.innerHTML = `<span style="color: #00ff00">Success!</span> ${fileName} uploaded.`;
                        setTimeout(() => {
                            pBar.style.display = 'none';
                            pFill.style.width = '0%';
                        }, 2000);
                    }
                    pFill.style.width = percent + "%";
                }, 200);
            }
        });

        // Sağ tık engeli (Standard amk)
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
