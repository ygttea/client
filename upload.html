<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Cloud | Catbox Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face {
            font-family: 'ExFont';
            src: url('font.ttf');
        }

        :root {
            --bg: #050505;
            --card-bg: #0a0a0a;
            --accent: #ffffff;
            --border: #1a1a1a;
            --catbox: #634d9d; /* Catbox Moru/Mavisi */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'ExFont', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas#snow {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .upload-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 60px 40px;
            width: 500px;
            text-align: center;
            box-shadow: 0 30px 100px rgba(0,0,0,0.9);
            position: relative;
            z-index: 10;
        }

        .title { 
            font-size: 24px; 
            letter-spacing: 8px; 
            margin-bottom: 40px; 
            text-transform: uppercase;
            font-weight: 900;
        }

        .drop-zone {
            border: 1px dashed #222;
            border-radius: 20px;
            padding: 50px 20px;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }

        .drop-zone:hover { border-color: var(--catbox); background: rgba(99, 77, 157, 0.05); }

        .icon-box {
            background: rgba(255,255,255,0.03);
            width: 60px; height: 60px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 24px; color: var(--secondary);
        }

        #status {
            margin-top: 30px; font-size: 11px; color: #444;
            letter-spacing: 2px; text-transform: uppercase;
        }

        .progress-bar {
            width: 100%; height: 2px; background: #111;
            margin-top: 20px; display: none; overflow: hidden;
        }

        .progress-fill {
            height: 100%; background: var(--catbox); width: 0%;
            transition: 0.3s ease;
        }

        #link-display {
            background: #0d0d0d; border: 1px solid var(--catbox);
            padding: 15px; border-radius: 10px; margin-top: 25px;
            font-size: 11px; color: #fff; word-break: break-all;
            display: none; cursor: pointer;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #file-input { display: none; }

        .footer { margin-top: 40px; font-size: 9px; color: #222; letter-spacing: 4px; }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <div class="upload-card">
        <h1 class="title">UPLOAD & SHARE</h1>

        <label for="file-input" class="drop-zone">
            <div class="icon-box"><i class="fa-solid fa-cloud-arrow-up"></i></div>
            <p style="font-size: 14px; color: #ccc;">Dosyayı seç veya buraya sürükle</p>
            <p style="font-size: 10px; color: #444; margin-top: 5px;">CATBOX.MOE ENGINE - PERMANENT LINKS</p>
        </label>
        <input type="file" id="file-input">

        <div id="status">Ready for transmission...</div>
        
        <div class="progress-bar" id="p-bar">
            <div class="progress-fill" id="p-fill"></div>
        </div>

        <div id="link-display"></div>
        
        <div class="footer">CATBOX API INTEGRATION v1.2</div>
    </div>

    <script>
        // KAR YAĞIŞI SİSTEMİ
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let flakes = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            flakes = Array.from({length: 120}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2 + 0.5,
                d: Math.random() * 0.5 + 0.3
            }));
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            flakes.forEach(f => {
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.s, 0, Math.PI*2);
                ctx.fill();
                f.y += f.d;
                if(f.y > canvas.height) f.y = -5;
            });
            requestAnimationFrame(draw);
        }
        init(); draw();
        window.onresize = init;

        // CATBOX UPLOAD SİSTEMİ
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status');
        const pFill = document.getElementById('p-fill');
        const pBar = document.getElementById('p-bar');
        const linkDisp = document.getElementById('link-display');

        fileInput.onchange = async () => {
            const file = fileInput.files[0];
            if(!file) return;

            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);

            status.innerText = "UPLOADING TO CATBOX...";
            pBar.style.display = 'block';
            pFill.style.width = '30%';

            try {
                // Catbox CORS politikası nedeniyle bazen direkt tarayıcıdan izin vermez.
                // Eğer hata alırsan bu URL'nin önüne bir CORS proxy eklemen gerekebilir.
                const res = await fetch('https://catbox.moe/user/api.php', {
                    method: 'POST',
                    body: formData
                });

                if(!res.ok) throw new Error("Connection Error");

                const data = await res.text(); // Catbox direkt linki text olarak döner
                
                if(data.startsWith('http')) {
                    pFill.style.width = '100%';
                    status.innerHTML = "<span style='color: #fff'>UPLOAD COMPLETE</span>";
                    linkDisp.innerText = data;
                    linkDisp.style.display = 'block';
                } else {
                    status.innerText = "CATBOX REJECTED: " + data;
                }
            } catch (err) {
                console.error(err);
                status.innerText = "CORRUPTION DETECTED: TRY SMALLER FILE";
            }
        };

        linkDisp.onclick = () => {
            navigator.clipboard.writeText(linkDisp.innerText);
            const old = linkDisp.innerText;
            linkDisp.innerText = "LINK COPIED!";
            setTimeout(() => linkDisp.innerText = old, 1500);
        };
    </script>
</body>
</html>
