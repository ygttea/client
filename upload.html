<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Cloud | Anonymous Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #050505; --card-bg: #0a0a0a; --accent: #ffffff; --border: #1a1a1a; }
        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            margin: 0; overflow: hidden;
        }
        .upload-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 50px;
            width: 480px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .drop-zone {
            border: 2px dashed #222;
            border-radius: 15px; padding: 40px 20px;
            cursor: pointer; transition: 0.3s;
            margin-bottom: 20px;
        }
        .drop-zone:hover { border-color: #444; background: #0c0c0c; }
        .btn-copy {
            background: #fff; color: #000;
            font-weight: bold; padding: 12px;
            border-radius: 8px; width: 100%;
            margin-top: 15px; cursor: pointer; display: none;
        }
        #file-input { display: none; }
        .progress-bar { width: 100%; height: 2px; background: #111; margin-top: 20px; display: none; }
        .progress-fill { height: 100%; background: #fff; width: 0%; transition: 0.1s; }
        #link-display {
            background: #111; border: 1px solid #222;
            padding: 12px; border-radius: 8px;
            margin-top: 20px; font-size: 12px;
            word-break: break-all; display: none;
        }
    </style>
</head>
<body>

    <div class="upload-card">
        <h2 class="text-xl font-bold mb-8 tracking-[5px] uppercase">Upload & Share</h2>
        
        <label for="file-input" class="drop-zone" id="drop-area">
            <i class="fa-solid fa-cloud-arrow-up text-4xl mb-4 text-gray-600"></i>
            <p class="text-sm text-gray-400">Dosyayı buraya bırak veya tıkla</p>
            <p class="text-[10px] text-gray-600 mt-2">Max 2GB - Linkler 2 hafta geçerlidir</p>
        </label>
        <input type="file" id="file-input">

        <div id="status" class="text-xs text-gray-500">Ready for transmission...</div>
        
        <div class="progress-bar" id="p-bar">
            <div class="progress-fill" id="p-fill"></div>
        </div>

        <div id="link-display"></div>
        <button class="btn-copy" id="copy-btn" onclick="copyLink()">COPY LINK</button>

        <div class="mt-10 text-[9px] text-gray-800 tracking-[3px] uppercase">Protected by Secure-Cloud API</div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status');
        const pBar = document.getElementById('p-bar');
        const pFill = document.getElementById('p-fill');
        const linkDisplay = document.getElementById('link-display');
        const copyBtn = document.getElementById('copy-btn');

        fileInput.addEventListener('change', async function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                const formData = new FormData();
                formData.append('file', file);

                status.innerText = "Yükleniyor: " + file.name;
                pBar.style.display = 'block';
                linkDisplay.style.display = 'none';
                copyBtn.style.display = 'none';

                try {
                    // File.io API'sine gönderiyoruz amk, beleş ve kolay
                    const response = await fetch('https://file.io', {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (result.success) {
                        pFill.style.width = "100%";
                        status.innerHTML = `<span class="text-green-500">Yüklendi!</span>`;
                        linkDisplay.innerText = result.link;
                        linkDisplay.style.display = 'block';
                        copyBtn.style.display = 'block';
                    } else {
                        status.innerText = "Hata: Yüklenemedi amk.";
                    }
                } catch (error) {
                    status.innerText = "Sunucu hatası sikeyim!";
                    console.error(error);
                }
            }
        });

        function copyLink() {
            const link = linkDisplay.innerText;
            navigator.clipboard.writeText(link);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "COPIED!";
            setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
        }

        // Drag & Drop Efekti
        const dropArea = document.getElementById('drop-area');
        ['dragenter', 'dragover'].forEach(name => {
            dropArea.addEventListener(name, (e) => {
                e.preventDefault();
                dropArea.style.borderColor = "#fff";
            });
        });
        ['dragleave', 'drop'].forEach(name => {
            dropArea.addEventListener(name, (e) => {
                e.preventDefault();
                dropArea.style.borderColor = "#222";
            });
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
