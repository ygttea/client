<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Cloud | Upload & Share</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Senin o özel fontun amcık */
        @font-face {
            font-family: 'ExFont';
            src: url('font.ttf');
        }

        :root {
            --bg: #050505;
            --card-bg: #0a0a0a;
            --accent: #ffffff;
            --border: #1a1a1a;
            --secondary: #555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'ExFont', 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* KAR YAĞIŞI EFEKTİ (Üstlerden dökülen o kar) */
        canvas#snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .upload-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 60px 40px;
            width: 500px;
            text-align: center;
            box-shadow: 0 30px 100px rgba(0,0,0,0.9);
            position: relative;
            z-index: 20;
        }

        .title {
            font-size: 24px;
            letter-spacing: 8px;
            font-weight: 900;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .drop-zone {
            border: 1px dashed #222;
            border-radius: 20px;
            padding: 50px 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
        }

        .drop-zone:hover {
            border-color: #444;
            background: rgba(255,255,255,0.01);
            transform: scale(1.02);
        }

        .icon-box {
            background: rgba(255,255,255,0.03);
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
            color: #444;
        }

        .main-text { font-size: 14px; color: #ccc; margin-bottom: 8px; }
        .sub-text { font-size: 10px; color: #444; letter-spacing: 1px; }

        #status {
            margin-top: 30px;
            font-size: 11px;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-bar {
            width: 100%;
            height: 1px;
            background: #111;
            margin-top: 20px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: 0.1s;
        }

        #link-display {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 25px;
            font-size: 11px;
            color: #3399ff;
            word-break: break-all;
            display: none;
            cursor: pointer;
        }

        .footer {
            margin-top: 50px;
            font-size: 9px;
            color: #222;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        #file-input { display: none; }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <div class="upload-card">
        <h1 class="title">UPLOAD & SHARE</h1>

        <label for="file-input" class="drop-zone" id="drop-area">
            <div class="icon-box">
                <i class="fa-solid fa-cloud-arrow-up"></i>
            </div>
            <p class="main-text">Dosyayı buraya bırak veya tıkla</p>
            <p class="sub-text">Max 2GB - Linkler 2 hafta geçerlidir</p>
        </label>
        <input type="file" id="file-input">

        <div id="status">Ready for transmission...</div>
        
        <div class="progress-bar" id="p-bar">
            <div class="progress-fill" id="p-fill"></div>
        </div>

        <div id="link-display" onclick="copyLink()"></div>

        <div class="footer">PROTECTED BY SECURE-CLOUD API</div>
    </div>

    <script>
        // KAR YAĞIŞI SİSTEMİ
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function initSnow() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            flakes = [];
            for (let i = 0; i < 150; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    s: Math.random() * 2 + 1,
                    d: Math.random() * 1 + 0.5
                });
            }
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.s, 0, Math.PI * 2);
                f.y += f.d;
                if (f.y > height) f.y = -10;
            });
            ctx.fill();
            requestAnimationFrame(drawSnow);
        }

        window.onresize = initSnow;
        initSnow();
        drawSnow();

        // UPLOAD SİSTEMİ (FILE.IO API)
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status');
        const pBar = document.getElementById('p-bar');
        const pFill = document.getElementById('p-fill');
        const linkDisplay = document.getElementById('link-display');

        fileInput.addEventListener('change', async function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                const formData = new FormData();
                formData.append('file', file);

                status.innerText = "UPLOADING: " + file.name.toUpperCase();
                pBar.style.display = 'block';
                linkDisplay.style.display = 'none';

                try {
                    const response = await fetch('https://file.io', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();

                    if (result.success) {
                        pFill.style.width = "100%";
                        status.innerHTML = `<span style="color: #fff">SUCCESSFULLY UPLOADED</span>`;
                        linkDisplay.innerText = result.link;
                        linkDisplay.style.display = 'block';
                    } else {
                        status.innerText = "TRANSMISSION FAILED";
                    }
                } catch (e) {
                    status.innerText = "ERROR IN CLOUD SYSTEM";
                }
            }
        });

        function copyLink() {
            const link = linkDisplay.innerText;
            navigator.clipboard.writeText(link);
            const original = linkDisplay.innerText;
            linkDisplay.innerText = "COPIED TO CLIPBOARD";
            linkDisplay.style.color = "#fff";
            setTimeout(() => { 
                linkDisplay.innerText = original; 
                linkDisplay.style.color = "#3399ff";
            }, 1500);
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
